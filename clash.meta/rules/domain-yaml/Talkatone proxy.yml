#!url=https://raw.githubusercontent.com/LOWERTOP/Shadowrocket-First/main/Talkatone.sgmodule
#!name=Talkatone
#!desc=Talkatone 日常使用模块，可进入参数编辑设置分流
#!arguments=节点检测:PROXY, 代理分流:PROXY
#!arguments-desc=分流代理策略\n\n· 支持填入节点名称或代理分组名称指定分流\n\n· 默认值是首页节点\n\n· 本模块包含去广告规则，可去除部分第三方广告，仅适用于登陆后使用，不适用于软件注册。Talkatone 针对使用者 IP 的审查趋于严格，单纯的分流的做法可能在部分节点或网络环境下不再有效，建议分别测试有效节点
# 整理作者：https://github.com/LOWERTOP
# 仓库地址：https://github.com/LOWERTOP/Shadowrocket-First
payload:
  # 1. 节点质量判断 (保留了 WILDCARD 写法)
  - DOMAIN-WILDCARD,relay-*.tktn.be
  
  # 2. 常规 Talkatone 域名
  - DOMAIN-SUFFIX,tktn.at
  - DOMAIN-SUFFIX,tktn.be
  - DOMAIN-SUFFIX,vm.talkatone.com
  
  # 3. 贴图服务
  - DOMAIN-SUFFIX,tenor.com